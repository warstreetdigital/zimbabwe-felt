<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyanga | Zimbabwe: Felt</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/nyanga.css">
</head>
<body>
    <!-- Persistent Back Nav -->
    <a href="../home.html" class="back-nav" style="position: fixed; top: 2rem; left: 2rem; z-index: 1000; display: flex; align-items: center; gap: 1rem; text-decoration: none; color: white;">
        <div style="width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); background: rgba(0,0,0,0.2);">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </div>
    </a>

    <!-- Global Header for Audio UI -->
    <header class="global-header" style="justify-content: flex-end; position: fixed; top: 0; left: 0; right: 0; z-index: 1000;">
        <button class="audio-toggle" onclick="toggleZimMute()" id="audio-btn">
            <span id="audio-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></span>
        </button>
    </header>

    <!-- Visual Presentation Layer -->
    <div class="visuals-layer">
        <!-- Images injected by JS -->
    </div>

    <!-- Atmosphere Layers -->
    <div class="mist-system">
        <div class="mist-layer"></div>
        <div class="fog-cloud fog-1"></div>
        <div class="fog-cloud fog-2"></div>
        <div class="fog-cloud fog-3"></div>
        <div class="drifting-fog"></div>
    </div>
    <div class="lighting-breath"></div>
    <div class="particle-layer"></div>
    <div class="grain-overlay"></div>
    <div class="vignette"></div>

    <!-- Content Layer -->
    <div class="nyanga-container">
        <div class="nyanga-intro">
            <h1>NYANGA</h1>
            <p>“Walk carefully...”</p>
            <button class="enter-mist-btn" id="enter-mist-btn">ENTER THE MIST</button>
        </div>
        
        <div class="ny-controls">
            <div class="ny-progress-container">
                <div class="ny-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Hidden Gateway -->
    <div class="nyanga-today-gateway" id="today-gateway">
        <a href="nyanga-today.html" class="gateway-btn" id="gateway-link">VIEW NYANGA TODAY</a>
    </div>

    <!-- Transition Fog -->
    <div class="transition-fog" id="transition-overlay"></div>

    <!-- Scripts -->
    <script src="../js/audio.js"></script>
    <script src="../js/nyanga.js"></script>
</body>
</html>
